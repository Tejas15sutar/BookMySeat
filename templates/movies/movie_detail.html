{% extends "users/basic.html" %} {% block content %} {% if movie.get_youtube_id %}
<div class="text-center">
    <img src="https://img.youtube.com/vi/{{ movie.get_youtube_id }}/hqdefault.jpg" class="img-fluid mb-3" alt="Trailer Thumbnail">

    <br>
    <div class="text-center">
        <button type="submit" class="btn btn-success btn-lg">
    <a href="https://www.youtube.com/watch?v={{ movie.get_youtube_id }}" target="_blank" class="btn btn-danger">
        ▶ Watch Trailer on YouTube
    </a> </button>
    </div>
</div>
{% else %}
<p>Trailer not available.</p>

{% endif %} {% endblock %}
