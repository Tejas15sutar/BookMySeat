{% extends "users/basic.html" %} {% block content %}
<div class="container py-5">
    <h1 class="text-center mb-5">Movies</h1>

    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <form method="GET" action="{% url 'movie_list' %}" class="search-bar">
                <div class="input-group">
                    <input class="form-control form-control-lg" name="search" placeholder="Search for Movies, Events, Plays, Sports and Activities" type="text" value="{{ request.GET.search|default_if_none:'' }}" aria-label="Search for movies" />
                    <div class="input-group-append">
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row" id="movieList">
        {% for movie in movies %}
        <div class="col-lg-2 col-md-3 col-sm-4 col-6 mb-4">

            <div class="card h-100 shadow-sm">

                <a href="{% url 'movie_detail' movie.id %}">
                    <div class="poster-container">
                        <img src="{{ movie.image.url }}" alt="{{ movie.name }}">
                    </div>
                </a>

                <div class="card-body">
                    <h5 class="card-title">
                        <a href="{% url 'movie_detail' movie.id %}" class="text-dark">
                        {{ movie.name }}
                    </a>
                    </h5>

                    <p class="card-text">
                        <i class="fas fa-star text-warning"></i> {{ movie.rating }}
                    </p>

                    <p class="card-text">
                        <small class="text-muted">
                        <i class="fas fa-users"></i> Cast: {{ movie.cast|truncatechars:80 }}
                    </small>
                    </p>
                </div>

                <div class="card-footer bg-white border-top-0 text-center">
                    <a href="{% url 'theater_list' movie.id %}" class="btn btn-outline-primary btn-sm">
                    View Theaters
                </a>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        .card {
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1) !important;
        }
        
        .card-img-top {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }
        
        .poster-container {
            width: 100%;
            height: 260px;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .poster-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-body {
            padding: 10px;
        }
        
        .card-title {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .card-text {
            font-size: 13px;
        }
    </style>

    <script>
        $(document).ready(function() {
            // Add animation to cards on hover
            $('.card').hover(
                function() {
                    $(this).addClass('shadow');
                },
                function() {
                    $(this).removeClass('shadow');
                }
            );

            // Implement client-side filtering
            $('input[name="search"]').on('input', function() {
                var searchTerm = $(this).val().toLowerCase();
                $('#movieList .col-md-4').each(function() {
                    var movieTitle = $(this).find('.card-title').text().toLowerCase();
                    if (movieTitle.includes(searchTerm)) {
                        $(this).show();
                    } else {
                        $(this).hide();
                    }
                });
            });
        });
    </script>

    {% endblock %}
